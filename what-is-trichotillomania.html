    <script type="application/ld+json">{"@context":"https://schema.org","@type":"FAQPage","mainEntity":[{"@type":"Question","name":"מהי טריכוטילומניה?","acceptedAnswer":{"@type":"Answer","text":"טריכוטילומניה (Trichotillomania, TTM) היא תופעה שבה עולה דחף לתלוש שיער מהגוף, לעיתים באופן שאינו רצוני ולפעמים מבלי לשים לב. היא חלק ממשפחת ההפרעות ההתנהגותיות הממוקדות בגוף (BFRB). הדחף יכול לספק הקלה רגעית, אך לעיתים מתלווים אליו בושה, אשמה או תחושת בדידות. זו אינה בחירה אישית אלא דפוס התמודדות, והיא מלווה עשרות אלפי ישראלים וישראליות בכל גיל, מגדר ורקע."}},{"@type":"Question","name":"מתי תלישת שיער נחשבת להפרעה?","acceptedAnswer":{"@type":"Answer","text":"כאשר התלישה חוזרת שוב ושוב, פוגעת באיכות החיים, גורמת לנשירת שיער ניכרת, פוגעת בביטחון העצמי או גורמת להימנעות חברתית ולמצוקה. הקריטריונים הרפואיים כוללים תלישה חוזרת, ניסיונות להפסיק ללא הצלחה, והשפעה תפקודית או רגשית. במצב כזה אפשר וכדאי לפנות לעזרה מקצועית."}},{"@type":"Question","name":"למה טריכוטילומניה קורית?","acceptedAnswer":{"@type":"Answer","text":"לטריכוטילומניה סיבות מגוונות: שילוב של גורמים ביולוגיים, רגשיים, חברתיים והרגליים. לפעמים יש טריגר ברור כמו מתח, חרדה או שינוי, ולפעמים התלישה נעשית כמעט ללא מודעות. לא תמיד אפשר לדעת למה זה התחיל, אבל אפשר לקבל עזרה ולחיות טוב עם ההתמודדות."}},{"@type":"Question","name":"איך מטפלים בטריכוטילומניה? מה באמת עוזר?","acceptedAnswer":{"@type":"Answer","text":"הטיפול המומלץ ביותר לפי המחקר הוא טיפול קוגניטיבי-התנהגותי (CBT) בשילוב תרגול תגובות חלופיות (HRT), וכן גישת ComB המותאמת אישית. בנוסף עוזרים: קבוצות תמיכה, הדרכת הורים לילדים, מיינדפולנס וכלים מעשיים. נכון להיום אין תרופה המאושרת לטיפול ישיר בטריכוטילומניה, וכל החלטה תרופתית צריכה להיעשות בהתייעצות עם רופא מומחה."}}]}</script>
